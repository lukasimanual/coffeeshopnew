<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Login</title>
  <style>
    body{
      font-family: Poppins, sans-serif;
      background: #F5F5DC;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box{
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }

    input{
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button{
      width: 100%;
      padding: 10px;
      background: #3E2723;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover{
      background: #6F4E37;
    }

    #error{
      color: red;
      font-size: 14px;
    }
    
    #username,
    #password{
      box-sizing: border-box;
    }
  </style>
</head>

<body>

  <div class="login-box">
    <h2>Admin Login</h2>

    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="error"></p>
  </div>

</body>

<script>
  
  if(user === "admin" && pass === "kopi123"){
  localStorage.setItem("isAdmin", "true");
  window.location.href = "dashboardadmin.html"; // baru masuk dashboard
}
  
  function login(){
    let user = document.getElementById("username").value;
    let pass = document.getElementById("password").value;
  
    if(user === "admin" && pass === "kopi123"){
      localStorage.setItem("isAdmin", "true");
      window.location.href = "dashboardadmin.html"; // langsung ke dashboard
    } else {
      document.getElementById("error").innerText = "Username / Password salah";
    }
  }

// Hanya redirect kalau udah login, tapi cuma setelah login berhasil
</script>

</html>
