<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.1/src/regular/style.css"
    />
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Dashboard</title>
</head>

<style>

  :root {
    --primary: #6F4E37;
    --dark: #3E2723;
    --cream: #F5F5DC;
    --light: #FFF8E1;
    --text: #333333;
    --accent: #D7CCC8;
  }

  *{
    margin: 0;
    padding: 0;
    border: none;
    outline: none;
    box-sizing: border-box;
    font-family: Poppins, Sans-Serif;
  }
  
  body{
    display: block;
    background: var(--cream);
  }
  
  .sidebar{
    position: fixed;
    top: 0;
    left: -250px;
    bottom: 0;
    width: 200px;
    height: 100vh;
    padding: 0 0.5rem;
    color: #fff;
    transition: all 0.5s cubic-bezier(0.77,0.2,0.05,1.0);
    background: var(--dark);
  }
  
  .sidebar.active{
    left: 0;
  }
  
  .menu{
    height: 88%;
    position: relative;
    list-style: none;
    padding: 0;
  }
  
  .menu li{
    padding: 1rem;
    margin: 8px 0;
    border-radius: 8px;
    transition: all 0.5s ease-in-out;
  }
  
  .menu li:hover,
  .active{
    background: var(--dark);
  }
  
  .logo{
    letter-spacing: 2px;
    height: 80px;
    padding: 16px;
  }
  
  .menu a{
    color: white;
    text-decoration: none;
    font-size: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  
  .menu a span{
    overflow: hidden;
  }
  
  .menu a i{
    font-size: 1.2rem;
  }
  
  .logout{
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
  }
  
  .menu-icons{
    position: fixed;
    top: 15px;
    left: 20px;
    z-index: 1000;
    cursor: pointer;
    color: black;
    font-size: 2rem;
  }
  
  .menu-icons.active {
    color: white;
  }
  
  
    .halamanutama{
    padding: 70px 0;
    height: 100vh;
  }
  
  .halamanutama h1{
    text-align: center;
    letter-spacing: 3px;
  }
  
  .dash{
    margin: 50px 0;
    font-size: 18px;
    text-align: center;
    display: grid;
    grid-template-columns: repeat (2, 1fr);
    gap: 10px;
  }
  
  .dash > div {
    flex: 1;
    margin: 0 10px;
  }
  
  #pendapatan{
    background: tomato;
    color: white;
  }
  
  #pesananpending{
    background: green;
    color: white;
  }
  
  #pesanandiproses{
    background: blue;
    color: white;
  }
  
  #pesananselesai{
    background: red;
    color: white;
  }
  
  .box{
    padding: 20px;
    height: 110px;
    border-radius: 10px;
  }
  
  table {
    width: 90%;
    margin: 20px auto; /* Agar tabel di tengah */
    border-collapse: collapse; /* Menghilangkan spasi antar garis border */
    background: white;
    border-radius: 8px;
    overflow: hidden;
    font-size: 7px;
  }
  
  th, td {
    padding: 12px 15px;
    text-align: left;
    border-bottom: 1px solid #ddd;
  }
  
  th {
    background-color: var(--dark);
    color: white;
    text-transform: uppercase;
    font-size: 8px;
  }
  
  tr:hover {
    background-color: #f5f5f5; /* Efek highlight saat baris didekati */
  }

  
</style>

<body>
  <div class="menu-icons" id="hamburger">
    <i class="ph ph-list"></i>
  </div>
  
  <div class="sidebar">
    <div class="logo"></div>
    <ul class="menu">
      <li class="active">
        <a href="#">
          <i class="fas fa-tachometer-alt"></i>
          <span>Dashboard</span>
        </a>
      </li>
      <li>
        <a href="#table">
          <i class="fas fa-user"></i>
          <span>Profile</span>
        </a>
      </li>
      <li>
        <a href="#">
          <i class="fas fa-chart-bar"></i>
          <span>Statistic</span>
        </a>
      </li>
      <li>
        <a href="#">
          <i class="fas fa-briefcase"></i>
          <span>Careers</span>
        </a>
      </li>
      <li>
        <a href="#">
          <i class="fas fa-question-circle"></i>
          <span>FAQ</span>
        </a>
      </li>
      <li>
        <a href="#">
          <i class="fas fa-star"></i>
          <span>Testimoni</span>
        </a>
      </li>
      <li>
        <a href="#">
          <i class="fas fa-cog"></i>
          <span onclick="bersihkanSemua()">Reset</span>
        </a>
      </li>
      <li class="logout">
        <a href="kopi.html">
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
        </a>
      </li>
    </ul>
  </div>
  
  <section class="halamanutama">
    <h1>Hello Admin!!!</h1>
    <div class="dash">
      <div class="box" id="pendapatan">
        <h3>Total Pendapatan</h3>
        <p id="daspendapatan"></p>
      </div>
      
      <div class="box" id="pesananpending">
        <h3>Pesanan Pending</h3>
        <p id="daspending"></p>
      </div>
      
      <div class="box" id="pesanandiproses">
        <h3>Pesanan Diproses</h3>
        <p id="dasproses"></p>
      </div>
      
      <div class="box" id="pesananselesai">
        <h3>Pesanan Selesai</h3>
        <p id="dasselesai"></p>
      </div>
    </div>
  </section>
  
  <section class="halamanutama" id="table">
    <table border="1" cellspacing="0" cellpadding="5" width="100%">
      <thead>
        <tr>
          <th>Nama</th>
          <th>Items</th>
          <th>Metode-Order</th>
          <th>Metode-Pembayaran</th>
          <th>Alamat</th>
          <th>Harga</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
          <td></td>
        </tr>
      </tbody>
    </table>
  </section>
</body>

<script>
  function bersihkanSemua() {
    if (confirm("Yakin mau hapus semua data pesanan?")) {
      localStorage.removeItem("orders");
    }
  }

  history.pushState(null, null, location.href);
  window.onpopstate = function () {
    history.go(1); // kalau pencet back, langsung maju lagi
  };
  
  if(localStorage.getItem("isAdmin") !== "true"){
    window.location.href = "adminlogin.html"; // kalau belum login, balik ke login
  }

  function logout(){
    localStorage.removeItem("isAdmin");
    window.location.href = "kopi.html"; // balik ke user page
  }
  
  function updateDashboard(){
    const allOrders = JSON.parse(localStorage.getItem("orders")) || [];
  
    let totalPendapatan = 0;
    let pending = 0;
    let diproses = 0;
    let selesai = allOrders.length; // kalau belum ada status, semua dianggap selesai

  allOrders.forEach(order => {
    totalPendapatan += order.harga;

    // kalau mau bikin status realistis, bisa tambahkan properti status saat submit
    // misal: order.status = "pending";
    if(order.status === "pending") pending++;
    else if(order.status === "diproses") diproses++;
    else if(order.status === "selesai") selesai++;
  });

    document.getElementById("daspendapatan").innerText = "Rp " + totalPendapatan.toLocaleString("id-ID");
    document.getElementById("daspending").innerText = pending;
    document.getElementById("dasproses").innerText = diproses;
    document.getElementById("dasselesai").innerText = selesai;
  }

// panggil pas halaman load
  window.onload = function() {
  // 1. Cek Auth
  if(localStorage.getItem("isAdmin") !== "true"){
    window.location.replace("adminlogin.html");
    return; // Berhenti di sini jika bukan admin
  }

  // 2. Update Data Dashboard
  updateDashboard();
  tampilkanTabel();
  
  // 3. (Opsional) Tambahkan Smooth Scroll
  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function (e) {
      e.preventDefault();
      const target = document.querySelector(this.getAttribute('href'));
      if (target) {
        target.scrollIntoView({
          behavior: 'smooth'
        });
        // Tutup sidebar otomatis setelah klik (untuk mobile)
        sidebar.classList.remove("active");
        hamburger.classList.remove("active");
        hamburger.querySelector("i").classList.replace("ph-x", "ph-list");
      }
    });
  });
}
  
  const hamburger = document.getElementById("hamburger");
  const sidebar = document.querySelector(".sidebar");
  
  // Ganti event listener hamburger kamu dengan ini
  hamburger.addEventListener("click", () => {
    const isOpen = sidebar.classList.toggle("active");
    hamburger.classList.toggle("active");
    
    const icon = hamburger.querySelector("i");
    if (isOpen) {
      icon.classList.replace("ph-list", "ph-x");
      history.pushState({ menu: "open" }, ""); // Catat di history kalau menu buka
    } else {
      icon.classList.replace("ph-x", "ph-list");
    }
  });
  
  // Tangani tombol kembali
  window.onpopstate = function (event) {
    if (sidebar.classList.contains("active")) {
      // Jika menu terbuka, tutup menunya saja
      sidebar.classList.remove("active");
      hamburger.classList.remove("active");
      hamburger.querySelector("i").classList.replace("ph-x", "ph-list");
    } else {
      // Jika menu sudah tutup, biarkan proses back normal (atau arahkan ke login jika perlu)
      // history.back(); 
    }
  };
  
  
  function tampilkanTabel(){
    const allOrders = JSON.parse(localStorage.getItem("orders")) || [];
    
    const tableBody = document.querySelector("table tbody");
    
    if (!tableBody) return;
    
    tableBody.innerHTML = "";
    
    allOrders.forEach((order) => {
      const row = `
      <tr>
        <td>${order.nama}</td>
        <td>${order.menu}</td>
        <td>${order.order}</td>
        <td>${order.metodepembayaran}</td>
        <td>${order.alamat || "-"}</td>
        <td>Rp ${order.harga.toLocaleString("id-ID")}</td>
      </tr>
      `;
      tableBody.innerHTML += row;
    });
  }

</script>

</html>
